name: Docker Build CI

on:
  push:
    branches:
      - main
      - dev

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout your repository
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 3️⃣ Build backend Docker image
      - name: Build backend image
        run: |
          docker build \
            -t siyathuru-backend:latest \
            -t siyathuru-backend:${GITHUB_REF_NAME} \
            ./backend

      # 4️⃣ Build frontend Docker image
      - name: Build frontend image
        run: |
          docker build \
            -t siyathuru-frontend:latest \
            -t siyathuru-frontend:${GITHUB_REF_NAME} \
            ./frontend/siyathuru_frontend
