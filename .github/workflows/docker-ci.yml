name: Docker Build CI

on:
  push:
    branches:
      - main
      - dev

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout your repository
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 3️⃣ Set branch name for tagging
      - name: Set branch name
        id: vars
        run: echo "BRANCH_NAME=${GITHUB_REF##*/}" >> $GITHUB_ENV

      # 4️⃣ Build backend Docker image
      - name: Build backend image
        run: |
          docker build \
            -t siyathuru-backend:latest \
            -t siyathuru-backend:${BRANCH_NAME} \
            ./backend

      # 5️⃣ Build frontend Docker image
      - name: Build frontend image
        run: |
          docker build \
            -t siyathuru-frontend:latest \
            -t siyathuru-frontend:${BRANCH_NAME} \
            ./frontend
