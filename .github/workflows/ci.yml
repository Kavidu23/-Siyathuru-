name: CI

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # ======================
      # Backend
      # ======================
      - name: Install backend dependencies
        run: |
          cd backend
          npm install

      - name: Run backend tests
        run: |
          cd backend
          npm test

      # ======================
      # Frontend
      # ======================
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Run frontend tests (Angular + Karma)
        run: |
          cd frontend
          npm test -- --watch=false --browsers=ChromeHeadless

        # Key points:
        # --watch=false → makes sure Angular tests exit after running (important in CI, otherwise Karma waits forever).
        # --browsers=ChromeHeadless → runs tests in a headless Chrome, since CI runners don’t have a GUI.
        # You need separate install/test steps for backend and frontend folders.
