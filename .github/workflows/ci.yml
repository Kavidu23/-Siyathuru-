name: CI

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:

#Prevents multiple CI runs on same branch
concurrency:
  group: ci-${{ github.ref }}
  #Cancels old runs when new commit comes
  cancel-in-progress: true

#Allows only read access to repo
permissions:
  contents: read

jobs:
  backend:
    name: Backend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prettier check
        run: npm run format:check

      - name: ESLint
        run: npm run lint

      - name: Run tests
        env:
          CI: true
        run: npm test

  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prettier check
        run: npm run format:check

      - name: ESLint
        run: npm run lint

      - name: Build
        env:
          CI: true
        run: npm run build

      - name: Run unit tests (ChromeHeadless)
        env:
          CI: true
        run: npm test -- --watch=false --browsers=ChromeHeadless
