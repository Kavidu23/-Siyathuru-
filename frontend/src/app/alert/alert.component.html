<div class="alert-create-page">
  <h2 class="form-title">Create Community Alert</h2>

  <div class="alert-form-card">
    <!-- TITLE -->
    <div class="form-group">
      <label>Alert Title</label>
      <input type="text" placeholder="Enter alert title" />
    </div>

    <!-- MESSAGE -->
    <div class="form-group">
      <label>Message</label>
      <textarea placeholder="Enter alert message"></textarea>
    </div>

    <!-- SEVERITY -->
    <div class="form-group">
      <label>Severity</label>

      <select>
        <option>info</option>
        <option>warning</option>
        <option>critical</option>
      </select>
    </div>

    <!-- ACTIVE -->
    <div class="form-group toggle">
      <label>Active</label>
      <input type="checkbox" checked />
    </div>

    <!-- BUTTON -->
    <div class="form-actions">
      <button class="btn-primary">Create Alert</button>
      <button class="btn-secondary">Cancel</button>
    </div>
  </div>
</div>
