<div class="alert-create-page">
  <h2 class="form-title">Create Community Alert</h2>

  <div class="alert-form-card">
    <!-- TITLE -->
    <div class="form-group">
      <label>Alert Title</label>
      <input type="text" placeholder="Enter alert title" [(ngModel)]="form.title" />
    </div>

    <!-- MESSAGE -->
    <div class="form-group">
      <label>Message</label>
      <textarea placeholder="Enter alert message" [(ngModel)]="form.message"></textarea>
    </div>

    <!-- SEVERITY -->
    <div class="form-group">
      <label>Severity</label>
      <select [(ngModel)]="form.severity">
        <option value="info">info</option>
        <option value="warning">warning</option>
        <option value="critical">critical</option>
      </select>
    </div>

    <!-- ACTIVE -->
    <div class="form-group toggle">
      <label>Active</label>
      <input type="checkbox" [(ngModel)]="form.isActive" />
    </div>

    <!-- BUTTON -->
    <div class="form-actions">
      <button class="btn-primary" (click)="createAlert()" [disabled]="isLoading">
        {{ isLoading ? 'Creating...' : 'Create Alert' }}
      </button>
    </div>
  </div>
</div>
