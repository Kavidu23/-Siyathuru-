<div class="review-body">
  <h2 class="section-title">Join Requests</h2>

  <!-- LOADING -->
  <p *ngIf="isLoading">Loading requests...</p>

  <!-- REQUEST LIST -->
  <div class="request-card" *ngFor="let req of joinRequests">
    <div class="user-info">
      <div class="user-text">
        <strong>{{ req.user.name }}</strong>
        <p class="request-msg">{{ req.user.email }}</p>
        <small>Requested on: {{ req.requestedAt | date: "medium" }}</small>
      </div>
    </div>
    <div class="action-area">
      <button
        class="btn-primary"
        [disabled]="req.loading"
        (click)="acceptRequest(req)"
      >
        {{ req.loading && req.accepting ? "Accepting..." : "Accept" }}
      </button>
      <button
        class="btn-danger"
        [disabled]="req.loading"
        (click)="rejectRequest(req)"
      >
        {{ req.loading && !req.accepting ? "Rejecting..." : "Reject" }}
      </button>
    </div>
  </div>

  <!-- EMPTY STATE -->
  <p class="empty" *ngIf="!isLoading && joinRequests.length === 0">
    No pending requests
  </p>
</div>
