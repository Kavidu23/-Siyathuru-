<div class="review-body">
  <h2 class="section-title">Join Requests</h2>

  <!-- LOADING -->
  <p *ngIf="isLoading">Loading requests...</p>

  <!-- ERROR -->
  <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

  <!-- REQUEST LIST -->
  <div class="request-card" *ngFor="let req of joinRequests">
    <div class="user-info">
      <div class="user-text">
        <strong>{{ req.user.name }}</strong>

        <p class="request-msg">
          {{ req.user.email }}
        </p>

        <small>
          Requested on:
          {{ req.createdAt | date: "medium" }}
        </small>
      </div>
    </div>

    <div class="action-area">
      <button class="btn-primary" (click)="acceptRequest(req.user._id)">
        Accept
      </button>

      <button class="btn-danger" (click)="rejectRequest(req.user._id)">
        Reject
      </button>
    </div>
  </div>

  <!-- EMPTY STATE -->
  <p class="empty" *ngIf="!isLoading && joinRequests.length === 0">
    No pending requests
  </p>
</div>
