<section class="event-create-page">
  <div class="header-row">
    <h2 class="section-title">{{ communityName }} Members</h2>
    <div class="member-count" *ngIf="!isLoading">{{ members.length }} total</div>
  </div>

  <div *ngIf="isLoading">Loading members...</div>
  <div *ngIf="!isLoading && members.length === 0">No members found.</div>

  <div class="member-list">
    <div class="member-card" *ngFor="let member of members">
      <img
        [src]="member.profileImage || 'assets/default-user.png'"
        alt="{{ member.name }}"
        class="member-img"
      />
      <div class="member-info">
        <strong>
          {{ member.name }}
          <span *ngIf="member._id === leaderId" class="leader-badge">Leader</span>
        </strong>
        <p *ngIf="member.email">{{ member.email }}</p>
      </div>
      <button class="btn-secondary" (click)="removeMember(member._id)">Remove</button>
    </div>
  </div>
</section>
<app-footer></app-footer>
