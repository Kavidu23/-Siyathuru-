<div class="nav">
  <ol>
    <!-- LEFT : LOGO -->
    <li class="logo">
      <a routerLink="/home">
        <img src="logo.png" alt="logo" width="120" height="35" />
      </a>
    </li>

    <!-- RIGHT SIDE CONTAINER -->
    <li class="nav-right">
      <!-- Google Translate -->
      <div id="google_translate_element"></div>

      <!-- Discover -->
      <a *ngIf="showPublicNav" routerLink="/discover" id="discover"
        >Discover</a
      >

      <!-- Ask AI -->
      <div class="ask-ai" *ngIf="showPublicNav">
        <a routerLink="/ask-ai">Ask AI</a>
      </div>

      <!-- Login -->
      <a
        *ngIf="!isLoggedIn"
        href="javascript:void(0)"
        id="log"
        (click)="openLoginModal()"
      >
        Login
      </a>

      <!-- Sign Up -->
      <a
        *ngIf="!isLoggedIn"
        href="javascript:void(0)"
        id="sign"
        (click)="openSignupModal()"
      >
        Sign Up
      </a>

      <!-- Chat -->
      <div *ngIf="showChat" class="nav-chat">
        <a routerLink="/chatbox" class="chat-link">
          <span>Chat</span>
          <span *ngIf="hasUnread" class="chat-dot"></span>
        </a>
      </div>

      <!-- User Profile -->
      <div
        *ngIf="isLoggedIn"
        class="user-profile"
        (click)="goToUserDashboard()"
      >
        <img
          [src]="
            userData?.profileImage || 'https://via.placeholder.com/40?text=User'
          "
          alt="Profile"
          class="profile-img"
        />
        <span class="user-name">
          {{ userData?.name || "User" }}
        </span>
      </div>

      <!-- Logout -->
      <a
        *ngIf="isLoggedIn"
        href="javascript:void(0)"
        id="logout"
        (click)="logout()"
      >
        Logout
      </a>
    </li>
  </ol>
</div>
