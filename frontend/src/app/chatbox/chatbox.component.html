<div class="telegram-chat-interface">
  <div class="telegram-sidebar">
    <div class="telegram-contact active">
      <img src="chat1.png" alt="Profile" />
      <div class="contact-info">
        <strong>Chamika</strong>
        <p>Hello there!</p>
      </div>
    </div>
    <div class="telegram-contact">
      <img src="chat2.png" alt="Profile" />
      <div class="contact-info">
        <strong>Saman</strong>
        <p>Sent a new file</p>
      </div>
    </div>
    <div class="telegram-contact">
      <img src="chat3.png" alt="Profile" />
      <div class="contact-info">
        <strong>Nimal</strong>
        <p>Let's meet today</p>
      </div>
    </div>
  </div>

  <div class="telegram-chat-window">
    <div class="chat-header">
      <img src="chat4.png" alt="Profile" class="chat-header-img" />
      <span class="chat-header-name">Chamika</span>
    </div>

    <div class="chat-messages">
      <div class="message received">
        <p>Hello 👋 Welcome to the community chat!</p>
        <br />
        <span class="time">10:00 AM</span>
      </div>
      <div class="message sent">
        <p>Thanks! Excited to be here 😊</p>
        <br />
        <span class="time">10:01 AM</span>
      </div>
    </div>

    <div class="chat-input">
      <input type="text" placeholder="Type a message..." />
      <button class="send-btn">➤</button>
    </div>
  </div>
</div>
<app-footer></app-footer>
