<div class="event-create-page">
  <h2 class="section-title">Create Event</h2>

  <div class="event-form-card">
    <!-- COMMUNITY (READ ONLY) -->
    <div class="form-group">
      <label>Community ID</label>

      <input type="text" [(ngModel)]="form.communityId" readonly />
    </div>

    <!-- TITLE -->
    <div class="form-group">
      <label>Event Title</label>

      <input type="text" [(ngModel)]="form.title" placeholder="Enter event title" />
    </div>

    <!-- DESCRIPTION -->
    <div class="form-group">
      <label>Description</label>

      <textarea [(ngModel)]="form.description" placeholder="Enter event description"></textarea>
    </div>

    <!-- LOCATION -->
    <div class="form-group">
      <label>Location</label>

      <input type="text" [(ngModel)]="form.location" placeholder="Enter event location" />
    </div>

    <!-- DATE -->
    <div class="form-group">
      <label>Event Date</label>

      <input type="date" [(ngModel)]="form.eventDate" />
    </div>

    <!-- TIME -->
    <div class="form-group">
      <label>Event Time</label>

      <input type="time" [(ngModel)]="form.eventTime" />
    </div>

    <!-- ACTIONS -->
    <div class="form-actions">
      <button class="btn-primary" (click)="createEvent()" [disabled]="isLoading">
        {{ isLoading ? 'Creating...' : 'Create Event' }}
      </button>
    </div>
  </div>
</div>
