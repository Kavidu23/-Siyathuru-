<div class="event-create-page">
  <h2 class="form-title">Create Event</h2>

  <div class="event-form-card">
    <!-- TITLE -->
    <div class="form-group">
      <label>Event Title</label>
      <input type="text" placeholder="Enter event title" />
    </div>

    <!-- DESCRIPTION -->
    <div class="form-group">
      <label>Description</label>
      <textarea placeholder="Enter event description"></textarea>
    </div>

    <!-- LOCATION -->
    <div class="form-group">
      <label>Location</label>
      <input type="text" placeholder="Enter event location" />
    </div>

    <!-- DATE -->
    <div class="form-group">
      <label>Event Date</label>
      <input type="date" />
    </div>

    <!-- TIME -->
    <div class="form-group">
      <label>Event Time</label>
      <input type="time" />
    </div>

    <!-- ATTENDEES (placeholder) -->
    <div class="form-group">
      <label>Attendees (IDs)</label>
      <input type="text" placeholder="Enter user IDs comma separated" />
    </div>

    <!-- ACTION BUTTONS -->
    <div class="form-actions">
      <button class="btn-primary">Create Event</button>
      <button class="btn-secondary">Cancel</button>
    </div>
  </div>
</div>
