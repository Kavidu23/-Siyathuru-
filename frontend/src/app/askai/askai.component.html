<section class="ask-ai-page">
  <header class="ask-ai-header">
    <h1>Ask AI</h1>
    <p>Chat with AI and discover communities tailored for you.</p>
  </header>

  <div class="chat-container">
    <!-- Example Chat -->
    <div class="chat-message user-message">
      <p>Suggest me youth groups near Colombo</p>
    </div>

    <div class="chat-message ai-message">
      <p>Here are some youth groups you might like 👇</p>
      <div class="ai-suggestions">
        <div class="suggestion-card">
          <img
            src="https://source.unsplash.com/300x150/?youth,community"
            alt="Youth Group"
          />
          <div class="suggestion-info">
            <h3>Youth Leadership Group</h3>
            <p>Colombo · Free</p>
          </div>
        </div>

        <div class="suggestion-card">
          <img
            src="https://source.unsplash.com/300x150/?teamwork,students"
            alt="Youth Hub"
          />
          <div class="suggestion-info">
            <h3>Future Leaders Hub</h3>
            <p>Kandy · On Request</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Example Quick Suggestions -->
    <div class="quick-suggestions">
      <button>Youth Groups</button>
      <button>Women Empowerment</button>
      <button>Nearby Free Groups</button>
    </div>
  </div>

  <!-- Input Box -->
  <div class="chat-input">
    <input type="text" placeholder="Type your question..." />
    <button class="send-btn">Send</button>
  </div>
</section>
