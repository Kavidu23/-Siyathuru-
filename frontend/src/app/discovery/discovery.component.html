<section class="discovery-page">
  <header class="discovery-header">
    <h1>Explore Communities Near You 🔎</h1>
    <p>Filter and explore community locations on the map.</p>
  </header>

  <div class="discovery-layout">
    <!-- Filters Panel -->
    <aside class="filters-panel">
      <h2>Filters</h2>

      <!-- Location Search -->
      <div class="filter-group">
        <label for="locationSearch">Search Location</label>
        <input
          id="locationSearch"
          type="text"
          [(ngModel)]="searchQuery"
          (input)="onLocationSearch()"
          placeholder="Type a location"
        />
        <ul *ngIf="locationSuggestions.length" class="suggestions-list">
          <li
            *ngFor="let suggestion of locationSuggestions"
            (click)="selectLocation(suggestion)"
          >
            {{ suggestion.display_name }}
          </li>
        </ul>
      </div>

      <div class="filter-group">
        <label for="type">Type</label>
        <select id="type" [(ngModel)]="selectedType">
          <option value="all">All</option>
          <option *ngFor="let type of communities" value="{{ type.type }}">
            {{ type.type }}
          </option>
        </select>
      </div>

      <div class="filter-group">
        <label for="joinType">Join Type</label>
        <select id="joinType" [(ngModel)]="selectedJoinType">
          <option value="free">Free</option>
          <option value="request">On Request</option>
        </select>
      </div>
      <div class="filter-buttons">
        <button class="apply-btn" (click)="applyFilters()">
          Apply Filters
        </button>
        <button class="apply-btn" (click)="resetFilters()">
          Reset Filters
        </button>
      </div>
    </aside>

    <!-- Map & Results -->
    <main class="map-results">
      <div class="map-wrapper">
        <div id="map"></div>
      </div>
    </main>
  </div>
  <h2>Communities</h2>
  <section class="results">
    <div class="community-grid">
      <div class="community-card" *ngFor="let community of filteredCommunities">
        <img [src]="community.profileImage" alt="{{ community.name }}" />
        <div class="community-info">
          <h3>{{ community.name }}</h3>
          <p class="address">{{ community.location.address }}</p>
          <p class="type" [ngClass]="{ private: community.isPrivate }">
            Type: {{ community.isPrivate ? "request" : "free" }}
          </p>
        </div>
      </div>
    </div>

    <p *ngIf="filteredCommunities.length === 0" class="no-results">
      No communities found matching your criteria.
    </p>
  </section>
</section>
